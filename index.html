
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مخمخ رجا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0A1A14;
    --night-2:#0F2A20;
    --panel:#12382A;
    --panel-2:#173F2F;
    --gold:#D4AF37;
    --gold-soft:#C9A24B;
    --sand:#EFE3C6;
    --clay:#B85C38;
    --teamA:#3FA796;
    --teamB:#C9A24B;
    --used:#0C2218;
    --text:#EFE3C6;
    --muted:#9FB8AB;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #173F2F 0%, var(--night) 55%, #060F0B 100%);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  .sadu{
    height:14px; width:100%;
    background:
      repeating-linear-gradient(135deg, var(--gold) 0 7px, transparent 7px 14px),
      repeating-linear-gradient(45deg, var(--gold) 0 7px, transparent 7px 14px);
    background-blend-mode:screen; opacity:.85;
    mask-image: linear-gradient(90deg, transparent, black 5%, black 95%, transparent);
  }
  .sadu-strip{
    height:10px;
    background-image: repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 5px, transparent 5px, transparent 10px),
                       repeating-linear-gradient(-45deg, var(--clay) 0, var(--clay) 5px, transparent 5px, transparent 10px);
    background-size: 20px 20px, 20px 20px; opacity:.5;
  }
  header{ text-align:center; padding:26px 16px 8px; position:relative; }
  .admin-gear{
    position:absolute; top:20px; left:20px; background:rgba(0,0,0,.25);
    border:1px solid rgba(212,175,55,.35); color:var(--gold); font-size:18px;
    border-radius:10px; padding:8px 11px; cursor:pointer;
  }
  .admin-gear:hover{ background:rgba(212,175,55,.15); }
  .brand{
    font-family:'Cairo', sans-serif; font-weight:900;
    font-size:clamp(30px, 6vw, 52px); letter-spacing:1px; color:var(--gold);
    text-shadow: 0 0 18px rgba(212,175,55,.35), 0 2px 0 rgba(0,0,0,.4); margin:0;
  }
  .brand span{ color:var(--sand); }
  .tag{ color:var(--muted); font-size:14px; margin-top:6px; }

  .screen{ display:none; max-width:1180px; margin:0 auto; padding:20px 16px 60px; }
  .screen.active{ display:block; }

  .step-title{
    font-family:'Cairo'; font-weight:800; font-size:clamp(20px,3vw,28px);
    text-align:center; color:var(--sand); margin:18px 0 6px;
  }
  .step-sub{ text-align:center; color:var(--muted); font-size:13px; margin-bottom:22px; }

  /* setup */
  .setup-row{
    display:flex; gap:18px; justify-content:center; flex-wrap:wrap; margin-bottom:26px;
  }
  .team-setup{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid rgba(212,175,55,.3); border-radius:16px;
    padding:20px; width:340px; max-width:92vw;
  }
  .team-setup.A{ border-color:rgba(63,167,150,.5); }
  .team-setup.B{ border-color:rgba(201,162,75,.5); }
  .team-setup label{ font-family:'Cairo'; font-weight:800; font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
  .team-setup input[type=text]{
    width:100%; background:rgba(0,0,0,.25); border:1px solid rgba(239,227,198,.25);
    border-radius:10px; padding:10px 12px; color:var(--text); font-family:'Cairo'; font-weight:700;
    font-size:15px; margin-bottom:16px;
  }
  .lifelines-label{ font-family:'Cairo'; font-weight:800; font-size:13px; color:var(--muted); margin-bottom:8px; }
  .lifelines{ display:flex; gap:8px; flex-wrap:wrap; }
  .lifeline-chip{
    flex:1; min-width:58px; text-align:center; padding:10px 4px; border-radius:10px;
    border:1px solid rgba(239,227,198,.25); background:rgba(0,0,0,.2); cursor:pointer;
    font-size:11px; color:var(--muted);
  }
  .lifeline-chip .ic{ font-size:20px; display:block; margin-bottom:3px; }
  .lifeline-chip.sel{ border-color:var(--gold); background:rgba(212,175,55,.15); color:var(--sand); }
  .lifeline-count{ font-size:11px; color:var(--muted); margin-top:8px; text-align:center; }

  /* category grid */
  .cat-toolbar{ display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .custom-cat-input{
    background:rgba(0,0,0,.25); border:1px solid rgba(239,227,198,.3); border-radius:999px;
    padding:8px 16px; color:var(--text); font-family:'Tajawal'; font-size:13px; width:220px;
  }
  .add-cat-btn{
    background:var(--gold); color:#1A1306; border:none; border-radius:999px; padding:8px 16px;
    font-family:'Cairo'; font-weight:800; cursor:pointer; font-size:13px;
  }
  .cat-grid{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:12px; margin-bottom:20px;
  }
  @media (max-width:900px){ .cat-grid{ grid-template-columns:repeat(4, 1fr); } }
  @media (max-width:560px){ .cat-grid{ grid-template-columns:repeat(3, 1fr); } }
  .cat-pick{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:2px solid rgba(212,175,55,.18); border-radius:12px; cursor:pointer;
    text-align:center; padding:14px 4px 10px; transition:border-color .15s, transform .15s;
    position:relative;
  }
  .cat-pick:hover{ transform:translateY(-2px); }
  .cat-pick.sel{ border-color:var(--gold); background:linear-gradient(180deg, #1c4a35, #143527); }
  .cat-pick .ic{ font-size:30px; display:block; margin-bottom:6px; }
  .cat-pick .nm{ font-family:'Cairo'; font-weight:800; font-size:12px; color:var(--sand); line-height:1.3; }
  .cat-pick .check{
    position:absolute; top:6px; left:6px; width:18px; height:18px; border-radius:50%;
    background:var(--gold); color:#1A1306; font-size:11px; display:none; align-items:center; justify-content:center;
  }
  .cat-pick.sel .check{ display:flex; }

  .selection-status{ text-align:center; font-family:'Cairo'; font-weight:700; color:var(--muted); font-size:13px; margin-bottom:18px; }
  .selection-status b{ color:var(--gold); }

  .nav-buttons{ display:flex; justify-content:center; gap:14px; margin-top:18px; }
  .btn-main{
    font-family:'Cairo'; font-weight:800; border-radius:12px; padding:13px 30px; border:none;
    cursor:pointer; font-size:15px;
  }
  .btn-primary{ background:var(--gold); color:#1A1306; }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-ghost{ background:transparent; border:1px solid rgba(239,227,198,.35); color:var(--sand); }

  /* scoreboard (game screen) */
  .scoreboard{ display:flex; justify-content:center; gap:18px; margin:10px auto 6px; flex-wrap:wrap; }
  .team-card{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid rgba(212,175,55,.35); border-radius:14px; padding:12px 20px;
    min-width:210px; text-align:center; box-shadow:0 6px 22px rgba(0,0,0,.35);
  }
  .team-card.A{ border-color: rgba(63,167,150,.55); }
  .team-card.B{ border-color: rgba(201,162,75,.55); }
  .team-name{ font-family:'Cairo', sans-serif; font-weight:800; font-size:15px; }
  .team-score{ font-family:'Cairo'; font-weight:900; font-size:32px; margin-top:2px; }
  .team-card.A .team-score{ color:var(--teamA); }
  .team-card.B .team-score{ color:var(--teamB); }
  .team-lifelines{ display:flex; gap:6px; justify-content:center; margin-top:8px; }
  .team-lifelines .ic{
    font-size:16px; background:rgba(0,0,0,.2); border-radius:8px; padding:4px 6px; cursor:pointer;
    border:1px solid rgba(239,227,198,.2);
  }
  .team-lifelines .ic.used{ opacity:.25; text-decoration:line-through; cursor:default; }

  .reset-btn{
    display:block; margin:10px auto 0; background:none; border:1px solid rgba(239,227,198,.3);
    color:var(--muted); border-radius:20px; padding:5px 16px; font-family:'Tajawal'; font-size:12px; cursor:pointer;
  }
  .reset-btn:hover{ color:var(--sand); border-color:var(--gold); }

  .round-tabs{ display:flex; justify-content:center; gap:10px; margin:16px 0 6px; flex-wrap:wrap; }
  .round-tab{
    font-family:'Cairo'; font-weight:700; background:var(--panel); border:1px solid rgba(212,175,55,.25);
    color:var(--muted); padding:8px 20px; border-radius:999px; cursor:pointer; font-size:14px;
  }
  .round-tab.active{ background:var(--gold); color:#1A1306; border-color:var(--gold); }

  .board-wrap{ max-width:1180px; margin:14px auto 60px; padding:0 16px; }
  .board{ display:grid; gap:10px; }
  .cat-header{
    font-family:'Cairo'; font-weight:800; font-size:clamp(11px,1.4vw,14px);
    background:linear-gradient(180deg, var(--panel-2), var(--panel)); border:1px solid rgba(212,175,55,.3);
    border-radius:10px 10px 4px 4px; text-align:center; padding:12px 4px; min-height:58px;
    display:flex; align-items:center; justify-content:center; gap:4px; flex-direction:column; color:var(--sand); line-height:1.25;
  }
  .cat-header .ic{ font-size:18px; }
  .cell{
    background:linear-gradient(180deg, #0E2B20, #0A2118); border:1px solid rgba(212,175,55,.18);
    border-radius:8px; font-family:'Cairo'; font-weight:900; font-size:clamp(16px,2.2vw,24px);
    color:var(--gold-soft); text-align:center; padding:16px 4px; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, background .2s;
  }
  .cell:hover{ transform:translateY(-3px); box-shadow:0 8px 18px rgba(212,175,55,.18); background:linear-gradient(180deg, #123726, #0D2B1F); }
  .cell.used{ background:var(--used); color:#2C4A3D; cursor:default; box-shadow:none; transform:none; }
  .cell.used:hover{ transform:none; box-shadow:none; }

  .overlay{
    position:fixed; inset:0; background:rgba(4,10,7,.92); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.show{ display:flex; }
  .qcard{
    width:min(900px, 96vw); background:linear-gradient(180deg, var(--panel-2), var(--night-2));
    border:1px solid rgba(212,175,55,.4); border-radius:20px; padding:30px 30px 18px; position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.6); max-height:92vh; overflow:auto;
  }
  .qcard .topline{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .qcat{ font-family:'Cairo'; font-weight:800; color:var(--gold); font-size:15px; }
  .qpoints{
    font-family:'Cairo'; font-weight:900; color:var(--sand); background:rgba(212,175,55,.15);
    border:1px solid rgba(212,175,55,.4); padding:4px 14px; border-radius:999px; font-size:15px;
  }
  .qimg{
